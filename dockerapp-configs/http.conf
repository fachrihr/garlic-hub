ServerName ${SERVER_NAME}

<VirtualHost *:80>
    ServerName ${SERVER_NAME}
    ServerAdmin garlic@saghiadinos.de
    DocumentRoot "/var/www/public"
    <Directory "/var/www/public/">
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # CORS for media files accessed by JS clients
    # Set CORS_ALLOWED_ORIGINS_REGEX in the environment, e.g.:
    # CORS_ALLOWED_ORIGINS_REGEX=(https://example\.com|http://localhost:5173)
    <Location "/var/mediapool/">
        <IfModule mod_headers.c>
            SetEnvIf Origin "${CORS_ALLOWED_ORIGINS_REGEX}" CORS_MATCH=$0
            Header always set Access-Control-Allow-Origin "%{CORS_MATCH}e" env=CORS_MATCH
        </IfModule>
    </Location>

    ErrorLog /var/www/var/weblogs/error.log
    CustomLog /var/www/var/weblogs/access.log combined
</VirtualHost>
